<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול משמרות | פאב אלפא</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { firebaseConfig } from "./config.js"; // טעינה מהקובץ החיצוני
        // ... המשך הקוד כרגיל
    </script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-12">
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-lg z-50 hidden transition-opacity"></div>

    <div class="max-w-xl mx-auto p-4">
        <div class="text-center mb-8">
            <img src="alfa.jpg" onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden')" class="w-24 h-24 mx-auto rounded-full object-cover border-4 border-amber-600">
            <div id="logo-text" class="hidden w-24 h-24 mx-auto rounded-full bg-slate-900 text-amber-600 flex items-center justify-center font-bold">אלפא</div>
        </div>

        <div id="login-section" class="bg-white p-8 rounded-2xl shadow-xl text-center">
            <h1 class="text-2xl font-bold mb-6">פאב קהילתי אלפא</h1>
            <input type="text" id="login-email" class="w-full mb-3 px-4 py-3 rounded-xl border" placeholder="אימייל">
            <input type="password" id="login-password" class="w-full mb-6 px-4 py-3 rounded-xl border" placeholder="סיסמה">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">התחבר</button>
        </div>

        <div id="app-section" class="hidden">
            <div id="admin-panel" class="bg-white p-5 rounded-2xl shadow-md border mb-6">
                <div class="flex border-b mb-4 gap-2">
                    <span class="px-4 py-2 text-sm font-bold border-b-2 border-amber-600">יצירת משמרת</span>
                </div>
                <div class="space-y-3">
                    <input type="date" id="admin-shift-date" class="w-full px-3 py-2 border rounded-lg">
                    <button onclick="saveShift()" class="w-full bg-amber-600 text-white py-2 rounded-lg font-bold">פרסם משמרת</button>
                </div>
            </div>
            <h2 class="font-bold text-lg mb-3">משמרות קרובות</h2>
            <div id="shifts-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        };

        window.handleLogin = () => {
            if (document.getElementById('login-email').value === 'admin' && document.getElementById('login-password').value === 'alfapub') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                loadShifts();
            } else {
                showToast('פרטים שגויים');
            }
        };

        window.saveShift = async () => {
            const date = document.getElementById('admin-shift-date').value;
            if(!date) return showToast('נא לבחור תאריך');
            try {
                await addDoc(collection(window.db, "shifts"), { date: date, createdAt: new Date() });
                showToast('המשמרת נוספה לענן!');
                document.getElementById('admin-shift-date').value = '';
            } catch (e) {
                showToast('שגיאה בשמירה');
            }
        };

        function loadShifts() {
            const q = query(collection(window.db, "shifts"), orderBy("date", "asc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('shifts-list');
                list.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                            <span class="font-bold text-slate-700">${data.date}</span>
                            <button onclick="deleteDoc(doc(window.db, 'shifts', '${doc.id}'))" class="text-red-500 hover:text-red-700 text-sm">מחק</button>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
